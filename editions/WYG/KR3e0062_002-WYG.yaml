body:
  text: 金匱鈎𤣥卷二元朱震亨撰心痛即胃腕痛心痛雖日數多不喫飲食不死若痛方止便喫還痛必湏三五服藥後方可喫物大凡心膈之痛湏分新久若明知身受寒氣口食寒物而病於初得之時當以温散或温利之藥若曰病得之稍久則成鬰矣鬱則蒸熱熱則久必火原病式中備言之矣若欲行温利寧無助火添病耶由是古方中多以山梔為熱藥之向導則邪伏而病易退正易復而病易安雖然病安之後若縱恣口味不改前非病復作時必難治也山梔炒去皮毎十五箇濃煎湯一呷入生薑汁令辣再煎小沸服或入芎一錢尤妙山梔大者用七箇或九箇大槩胃口有熱而作痛非山梔子不可佐以薑汁或半夏橘紅各五黄芩三甘草一用二陳湯加蒼芎倍加炒梔痛甚者加炒乾薑從之反治之法心痛輕者散之麻黄桂枝重者加石鹻川芎蒼术梔子必炒去皮用作丸服凡治病必湏先問平日起居如何假如心痛有因平日喜食熱物以致死血流於胃口作痛用桃仁承氣湯下之切記輕者用韭汁桔梗能開提氣血藥中兼用之以物柱按痛則止者挾虗也以二陳湯加炒乾薑和之有䖝痛者面上白斑唇紅能食属䖝治苦練根錫灰之類脉堅實不大便者下之痛甚者脉必伏多用温藥不用參术可用附子諸痛不可用補氣藥客寒犯胃草荳蔲丸用之熱亦可用止用一二服草荳蔲一錢四分褁燒熱去皮呉茱茰湯炮洗去梗焙秤益智仁白僵橘皮人參黃茋各八分生甘草歸身炙甘草青皮各六分麹末薑黄各四分桃仁七箇去皮半夏洗一錢麥蘖澤瀉一錢小便多减半柴胡四分詳膈下痛多為用之右一十八味除桃仁另研如泥外餘極細末同桃仁研匀用湯泡蒸餅為丸如桐子大毎服三十丸食逺用熱白湯送下旋斟酌多少用之又方用黄荆子炒焦為末米飲調服亦治白帶又方脾痛用海蛤粉佐以香附末用川芎山梔生薑煎辣湯調服為佳又方單用牡粉酒調下一二錢氣實不可用腰疼濕熱腎虗瘀血濕熱腰疼者遇天隂或乆坐而發者是腎虗者疼之不已者是也瘀血者日輕夜重者是脉大者腎虗用杜仲龜板黄栢知母枸把五味之類用猪脊髓丸脉澁者瘀血用補隂丸中加桃仁紅花濕熱者用蒼术杜仲黄栢川芎痰者用南星凡諸痛皆属火寒凉藥不可峻用必用温散之藥諸痛不可用人參盖人參補氣氣旺不通而痛愈甚臍下忽大痛者人中如黑色者多死難治也人面上忽有紅㸃者多死脇痛肝火盛木氣實有死血肝急有痰流注木氣實川芎蒼术青皮當歸龍會丸瀉火要藥死血痰流注二陳湯加南星蒼术川芎肝苦急急食辛以散之用撫芎蒼术血病入血藥中行血脇痛甚者用薑汁下龍會丸肝火盛故也咳嗽脇痛二陳湯加南星多香附青皮青黛薑汁腹痛有寒積熱死血食積濕痰戴云寒痛者綿綿痛而無増减者是時痛時止者是熱也死血痛者毎痛有處不行移者是也食積者甚欲大便利後痛减者是濕痰者凡痛必小便不利脉弦强者食脉滑者痰滑痰多作腹痛用苔芎蒼术香附白芷生薑汁入湯服腹中水鳴乃火繫動其水也二陳湯加黄芩黄連梔子凡心腹痛必用温散此是欝結不散阻氣不運故病在下者多属食宜温散之一老人腹痛年髙不禁下者用川芎蒼术香附白芷乾薑茯芩滑石痛風四肢百節走痛風熱風濕血虗有痰大法之方蒼术南星川芎白芷當歸酒黄芩在上者加𦍑活桂枝桔梗葳靈仙在下者加牛膝防己木通黄栢血虗者多用川芎當歸佐以桃仁紅花薄桂治痛風無味而薄者獨此能横行手臂領南星蒼术等治之上中下痛風方葳靈仙三錢南星二兩苔芎一兩白芷半兩桃仁五錢桂枝三錢防己半錢蒼术二兩黄柏酒浸炒二兩紅花一錢半𦍑活三錢神麴一兩炒草龍膽五分張子元氣血虗有痰濁隂火痛風人參一兩白术二兩黄栢二兩炒黒色山藥一兩海石一兩𤨏陽五錢乾薑五錢燒灰南星一兩敗龜板二兩酒炙熟地黄二兩粥為丸治臂痛半夏一錢陳皮五分茯苓五分蒼术一錢半酒芩一錢靈仙三分白术一錢甘草少許炒南星一錢香附一錢勞瘵其主在乎隂虚痰與血病青蒿一斗五升童便三斗文武火熬約童便减二斗去蒿熬至一斗入猪膽汁七箇再熬數沸甘草末收之虚勞身痩属火因火燒爍勞病四物湯加人尿薑汁咳血痰盛身熱多是血虗戴云咳血者嗽出痰内有血者是嘔血者嘔全血者是咯血者毎咯出皆是血疙瘩衂血者鼻中出血也溺血小便出血也下血者大便出血也雖有名色分六俱是熱證但有虚實新舊之不同或妄言為寒者誤也青黛訶子山梔海石𤓰蔞仁右為末薑汁蜜調噙化嗽甚者加杏仁後以八物湯加减調理身熱多是血虗四物湯加减嘔血火載血上錯經妄行脉大發熱喉中痛者是氣虚用人參黄茋蜜炙黄柏荆芥並當歸生地黄用之嘔血用韭汁童便薑汁磨欝金同飲之其血自清火載血上錯經妄行四物湯加炒梔子童便薑汁山茶花童便薑汁酒調欝金末治吐血入薑汁童便痰帶血絲出者童便薑汁竹瀝又方用韭汁童便二物相合用欝金細研入在二物之内同飲其血自消又方治衂血上行欝金如無山茶薑汁童便和好酒調服即止之咯血薑汁童便青黛入血藥中用之加四物湯地黄膏牛膝膏之類衂血凉血行血為主犀角地黄湯入鬱金同用經血逆行或血腥或唾血吐血用韭葉汁立效溺血屬熱山梔子炒水煎服或用小薊琥珀有血虗者四物湯加牛膝膏下血不可純用寒凉藥必於寒凉藥中用辛味并温如酒浸炒凉藥酒煮黄連之類有熱四物湯加炒梔子升麻秦芃膠珠下血屬虚當温散四物湯加炮乾薑升麻又方用白芷五倍子丸凡用血藥不可單行單止有風邪下䧟宜升提之盖風傷肝肝生血故有濕傷血宜行濕消熱可也内經謂身熱即死寒則生此亦是大槩言之必兼證詳之則可今豈無身熱生寒而死者脉沉小流連或㣲者易治脉浮大洪數者難愈宜滑不宜弦仲景治痢可温者五法可清者十法或觧表或利小便或待其自己區分易治難易極密但與瀉同立法不分學者當辯之大孔痛一曰温之一曰清之乆病身冷自汗脉沉小者宜温暴病身熱脉浮洪者宜清有可吐者有可下者有可汗者初得時元氣未虚必推蕩之此通用之法稍乆氣虗則不可先水泄後膿血此脾傷腎賊邪難愈先膿血後水泄此腎傷脾㣲邪易愈如荳汁者濕也盖脾胃為水穀之海無物不受常兼四藏故如五色之相雜當先通利此迎而奪之之義如虚者亦宜審之因熱而作不可用巴豆等藥如傷冷物者或可用亦宜謹之又有時疫作痢或至一家之内上下傳染相似却宜明運氣之勝復以治之腸風獨在胃與大腸出黄芩􅪮芃槐角升麻青黛夣遺專主熱脫精戴云因夣交而出精者謂之夣遺不因夣而自泄精者謂之精滑皆相火所動乆則有虚而無寒者也帶下與夣遺同法治青黛海石黄柏即春樹根丸内傷氣血不能固守當補八物湯加减吞椿樹根丸思想成病其病在心安神帶補熱則流通知母黄柏蛤粉精滑專主濕熱戴云滑者小便精滑下也俱是膀胱濕熱雖有赤白之異終無寒熱之别河間云天氣熱則水渾濁寒則澄徹清冷由此觀之濁之為病濕熱明矣黄栢知母牡蠣蛤粉又方良薑三錢芍藥二錢黄栢二錢燒灰存性樗樹皮白皮一兩半右為末糊為丸毎服三十丸濁濕熱有痰有虚赤濁屬血白濁屬氣寒則堅凝熱則流通大率皆是濕熱流住宜燥中宫之濕用二陳湯加蒼术白术燥去濕赤者乃是濕傷血加白芍藥仍用珍珠粉丸加椿樹根皮滑石青黛等作丸虚勞者用補隂藥大槩不利熱藥肥白人必多痰以二陳湯去其熱胃弱者兼用人參以柴胡升麻升胃中之氣丸藥用青黛黄栢炒褐色乾薑炒㣲黒色海石蛤粉胃中濁氣下流為赤白濁者用柴胡升麻蒼术白术二陳湯丸藥用樗末蛤粉炒薑炒黄栢專主胃中之濁氣下流滲入膀胱用青黛蛤粉肝脉弦者用青黛以瀉肝又方黄栢一兩炒黒生栢二錢半一作三兩海石三兩神麴五錢為末水丸有熱者黄栢滑石青黛之類燥濕痰南星半夏蛤粉右神麴為丸青黛為衣或用海石代麴張子元氣血兩虚有痰痛風時作隂火間起小便白濁或帶下赤白方在前痛風中一人便濁常有半年或時夣遺形痩作心虚主治珍珠粉丸和勻定志丸服一婦人年近六十形肥奉養膏梁飲食肥美中焦不清濁氣流入膀胱下注白濁白濁即是濕痰也戴云斷用二陳湯去痰加升麻柴胡升胃中之清氣加蒼术去濕白术補胃全在活法服四貼後濁减大半覺胷滿因柴胡升麻升動其氣痰阻滿閉用二陳湯加炒麴白术素無痰者升動胃氣不滿丸藥方青黛椿皮蛤粉滑石乾薑炒黄柏炒右為末炒神麴糊丸仍用前燥濕痰丸亦能治帶又方滑石利竅黄柏治濕熱青黛觧鬱結蛤粉醎寒入腎炒乾薑味苦歛肺氣下降使隂血生乾薑塩制之淋皆屬於痰熱淋者小便淋瀝欲去不去不去又來皆屬於熱也觧熱利小便山梔子之類用苦藥甘草煎服諸藥中皆加牛膝老人亦有氣虚者人參白术中帶木通山梔亦人死血作淋者以牛膝作膏此證亦能損胃不食小便不通氣虚血虚痰風閉實熱吐之以提其氣氣升則水自下盖氣承載其水也氣虚用人參黄茋升麻等先服後吐或參茋藥中探吐血虚四物湯先服後吐芎歸湯吐亦可痰多二陳湯先服後吐皆用探吐痰氣閉塞二陳湯加木香香附探吐實熱利之一婦人脾疼後患大小便不通此是痰隔中焦氣滯於下焦二陳湯加木通初喫後煎滓吐之闗格戴云闗格者謂膈中覺有所碍欲升不升欲䧏不降欲食不食此為氣之横格也必用吐提其氣之横格不必在出痰也有痰以二陳湯吐之吐中便有降有中氣虚不運者補氣藥中升降小便不禁屬熱屬虚戴云小便不禁出而不覺赤者有熱白者為氣虚也熱者五苓散加觧毒散虚者五苓散加四物湯癎驚痰宜吐戴云癎者俗曰猪癲風者是也大率行痰為主黄連南星𤓰蔞半夏尋痰尋火分多少治無不愈分痰分熱有熱者以凉藥清其心有痰者必用吐藥吐後用東垣安神丸此證必用吐吐後用平肝之藥青黛柴胡川芎之類徤忘戴云徤忘者為事有始無終言談不知首尾此以為病之名非比生成之愚頑不知世事者精神短少者多亦有痰者怔忡大故屬血虚有慮便動屬虚時作時止痰因火動戴云怔忡者心中不安愓愓然如人将捕者是也痩人多是血少肥人屬痰尋常者多是痰真覺心跳者是血少用四物安神之類驚悸血虚用硃砂安神丸痓大率與癎病相似多是血虚有火兼痰人參竹瀝之類不用兼風藥血塊一名積瘕塊在中為痰飲在右為食積在左為血積氣不能作塊成聚塊乃有形之物痰與食積死血此理曉然醋煑海石三稜莪术桃仁紅花五靈脂香附之類白术湯吞下瓦龍子能消血塊次消痰治塊當降火消食積食積即痰也行死血塊去湏大補石鹻一物有痰積有血塊可用洗滌垢膩又消食積吐䖝以黒錫炒成灰㯽榔末米飲調癥瘕戴云積聚癥瘕有積聚成塊不能移動者是癥或有或無或上或下或左或右者是瘕用蜀葵根煎湯煎人參白术陳皮青皮甘草梢牛膝成湯入細研桃仁𤣥明粉各少許熱飲一服可見塊下病重補接之後加减再行消塊丸即千金大消石丸止可磨塊不令人困湏量虚實而用可也硝石六兩大黄八兩人參甘草各三兩右為末以三年苦酒三斗置銅噐中以竹片作凖毎入一升作一刻柱噐中熬先納大黄不住手攪使㣲沸盡一刻乃下餘藥又盡一刻㣲火熬使可丸則取丸如雞子中黄大毎服一丸米飲下如不能大丸則作小丸如桐子大毎服三十丸後下如雞肝如米泔赤黒等色下後忌風冷淡軟粥將理又三聖膏未化石灰半斤為末瓦噐中炒令淡紅色提出候熱少减次下大黄末大黄一兩為末就爐炒候熱减入下桂心末桂心半兩為末畧炒入米醋熬成膏藥厚攤患處貼積聚塊大黄朴硝各一兩右為末用大蒜搗膏和勻貼之痞塊在皮裏膜外湏用補氣香附開之兼二陳湯加補氣藥先湏斷厚味茶癖石膏黄芩升麻右為末砂糖水調服癭氣先湏斷厚味海藻一兩黄藥二兩右為末以少許置於掌中時時舐之津嚥下如消三分之二湏止後藥服食積一方乃在婦人門食積條下疝濕熱痰積流下作痛大槩因寒鬱而作也即是痰飲食積并死血戴云疝本屬厥隂肝之一經余嘗見俗說小腸膀胱下部氣者皆妄言也子和云疝本肝經宜通勿塞只此見治之法專主肝經與腎絶無干不宜下㿗濕多疝氣灸大敦穴食積與瘀血成痛者梔子桃仁山查枳實呉茱茰右為末生薑汁順流水作湯調服按之不定必用桂枝屬虚桂枝山梔炒烏頭細切炒右為末薑汁為丸毎服三十丸刼痛治疝方定痛速效濕勝者加荔枝枳殻十五箇山梔炒糖毬炒茱萸炒又方守丸治㿗要藥不疼者蒼术南星白芷山查川芎半夏枳實為末神麴作丸治陽明受濕熱傳入大腸惡寒發熱小腸連毛際結核悶痛不可忍山梔炒枳殻炒桃仁炒山查等分右研細砂鉢内入生薑汁用水一盞煎令沸熱服之治諸疝發時用海石香附二味為末以生薑汁湯調服亦能治心痛治疝方梔子桃仁橘核茱萸川烏右碾煎服刼藥用烏頭細切炒梔子枳核散單止痛脚氣蒼术塩炒白术防己㯽榔川芎犀角甘草木通黄連生地黄酒炒黄栢有熱加黄芩黄連有痰加竹瀝薑汁大熱及時令熱加石膏大便實加桃仁小便澁加牛膝有食積流注蒼术黄栢防己南星川芎白芷作丸犀角㯽榔血虚加牛膝龜板如常腫者專主乎濕熱朱先生有方肥人加痰藥戴云有脚氣衝心宜四物加炒栢再宜湧泉宂用附子津拌貼以艾炙泄引其熱徤歩丸歸尾芍藥陳皮蒼术各一兩生地黄一兩半大腹子三箇牛膝茱茰各半兩黄芩半兩桂枝二錢右為末蒸餅為丸毎服百丸白术通草煎湯食前下一婦人足腫黄栢蒼术南星紅花酒洗草龍膽川芎牛膝酒洗生地黄筋動於足大指動上來至大腿近腰結了奉養厚因風寒作四物湯加酒芩紅花蒼术南星筋轉皆屬乎血熱四物湯加酒芩紅花大病虚脱夲是隂虚用艾炙丹田者所以補陽陽生則隂生故也不可用附子可用參多服痿斷不可作風治而用風藥濕熱痰無血而虚氣弱瘀血濕熱東垣徤歩方中加燥濕降隂火藥芩栢蒼术之類濕痰二陳湯中加蒼术白术黄芩之類入竹瀝氣虚四君子湯中加蒼术黄芩黄栢之類血虚四物湯中蒼术黄栢下補隂丸亦有食積妨碍不得降者亦有死血者徤歩丸方羗活柴胡滑石炒甘草炙天花粉酒製各半兩防己及酒防風澤瀉各三錢肉桂半錢川烏苦參酒製各一錢右為末酒糊丸如桐子大毎服七十丸煎愈風湯以空心服下之發熱隂虚難治戴云凡脉數而無力者便是隂虚也隂虚發熱用四物湯加黄栢兼氣虚加參茋白术盖四物湯加黄栢是降火補隂之妙藥又云隂虚發熱用四物湯甚者加龜板炒黄栢喫酒人發熱者難治不飲酒之人若因酒而發熱者亦難治一男子年三嵗因酒發熱用青黛𤓰蔞仁薑汁毎日以數匙入口中三日而愈陽虚惡寒戴云凡背惡寒甚者脉浮大而無力者是陽虚也用人參黄茋之類甚者加附子少許以行參茋之氣一女子惡寒用苦參一錢赤小豆一錢為末虀水吐用川芎蒼术南星黄芩酒麴丸手心熱梔子香附蒼术白芷川芎半夏生用右為末麴糊丸手麻此是氣虚也手木東垣云麻木氣不行也補肺中之氣是濕痰死血十指麻是胃中有濕痰死血厥因痰用白术竹瀝厥者手足冷也熱厥逆也非寒證因氣虚血虚熱承氣湯外感解散加薑汁酒面寒面熱火起寒鬱熱面寒退胃熱喉痺大槩多是痰熱也只以桐油吐之或用射干逆流水吐又方用李實根皮一片噙口内更用李實根碾水傅項上一遭立效新採園中者纒喉風戴云屬痰熱纒喉風者謂其咽喉裏外皆腫者是也用桐油以鵝翎探吐又法用燈油脚探吐之又方用逺志去心水調傅項上一遭立效喉咽生瘡並痛多屬虚血熱㳺行無制客於咽喉人參蜜炙黄柏荆芥虚人參竹瀝無實火熱黄連荆芥薄荷硝石右為細末用蜜薑汁調噙血虚四物湯中加竹瀝口瘡服凉藥不愈者此中焦氣不足虚火泛上無制用理中湯甚者加附子或噙官桂亦可又方用西𤓰漿水口痛甚者以此徐徐飲之冬月紫榴皮燒灰噙之酒皶鼻血熱入肺四物湯加陳皮紅花酒炒黄芩煎入好酒數滴就炒五靈脂末服効又用桐油入黄連以天弔藤燒油熱傅之肺癰已破入風者不治搜風湯吐之出醫壘元戎收歛瘡口止有合懽樹皮白歛煎湯飲之肺痿專主養肺養血養氣清金天疱瘡通聖散及蚯蚓泥畧炒蜜調傅之妙從肚皮上起者裏熱發外還服通聖散可也漏瘡湏先服補藥以生氣血即參茋术歸芎為主大劑服之外以附子末唾和作餅如錢厚以艾炷炙之漏大艾炷亦大漏小艾炷亦小但炙令㣲熱不可令痛乾則易之乾研為末再和再炙如困則止來日如前法再炙直至肉平為効亦有用附牛炙仍前氣血藥作膏藥貼之痔漏用五倍子朴硝桑寄生蓮房煎湯先薰後洗腫者用木鱉子五倍子研細末調傅漏專以凉藥為主痔漏方人參黄茋當歸川芎升麻枳殻條芩槐角腸癰作濕熱食積治入風難治治漏外塞藥蘆甘石小便煆牡礪粉結核或在頸或項在身在臂如腫毒者多痰注作核不散治耳後项門各一塊僵蚕炒青黛膽星酒大黄右為末蜜丸噙化之頸頬下生痰核二陳湯加炒大黄連翹桔梗柴胡治臂核作痛連翹防風川芎酒芩蒼术皂角刺治還跳穴痛防生附骨癰方以蒼术佐黄栢之辛行以青皮冬月加桂枝夏月加條子黄芩體虚者加土牛膝以生甘草為使大料煎入生薑汁帶辣食前飲之病甚者加黄栢桂枝十數貼發不動少加大黄一兩貼又不動者恐癰將成矣急橛地成坑以火煆紅沃以小便赤體坐其上以被蓆圍抱下體伏熱氣薰蒸腠理開血氣暢而愈脱肛氣熱氣虚氣虚補氣用人參當歸黄茋川芎升麻血虚者四物湯血熱者凉血四物湯加黄栢炒金匱鈎𤣥卷二
