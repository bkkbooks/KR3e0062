body:
  text: 金匱鈎𤣥卷三元朱震亨撰婦人科經水經候過期而作疼者乃虚中有熱所以作疼經水不及期血熱也四物湯加黄連經候將來而作疼者血實也桃仁香附黄連過期乃血少也川芎當歸𢃄人參白术與痰藥過期紫黑色有塊血熱也必作痛四物湯加黄連香附淡色過期者乃痰多也二陳湯加川芎當歸紫色成塊者乃是熱也四物湯加黄連之類痰多占住血海地位因而下多者目必漸昏肥人如此南星蒼术香附川芎作丸服肥人不及日數而多者痰多血虚有熱前方加黄連白术若血枯經閉者四物湯加桃仁紅花軀肥脂滿經閉者導痰湯加芎連不可服地黄泥鬲故也如用以生薑汁炒血崩崩之為病乃血之大下豈可為寒但血去後其人必虚當大補氣血東垣有治法但不言熱其主於寒學者冝再思之急則治其標白芷湯調百草霜甚者棕櫚皮灰後用四物湯加乾薑調理因勞者用參茋𢃄升補藥因寒者加乾薑因熱者加黄芩參茋崩過多者先服五靈脂末一服當分寒熱五靈脂能行能止婦人血崩用白芷香附為丸白𢃄用椒目末又用白芷末一方用生狗頭骨燒灰存性或酒調服或入藥服之又方用五靈脂半生半熟為末以酒調服氣虚血虚者皆於四物湯加人參黄茋漏下乃熱而虚者四物湯加黄連𢃄下赤白赤属血白属氣主治燥濕為先𢃄漏俱是胃中痰積流下滲入膀胱宜升無人知此肥人多是濕痰海石半夏南星蒼术川芎椿皮黄栢痩人𢃄病如有𢃄者是熱也黄栢滑石川芎椿皮海石甚者上必用吐以提其氣下用二陳湯加蒼术白术仍用丸子一本作瓦龍子又云赤白𢃄皆属於熱出於大腸小腸之分一方黄荆子炒焦為末米飲湯下治白𢃄亦治心痛羅先生治法或十棗湯或神祐丸或玉燭散皆可用不可峻攻實者可用此法虚則不宜血虚者加减四物湯氣虚者以參术陳皮間與之濕甚者用固腸丸相火動者於諸藥中加少炒栢滑者加龍骨赤石脂滯者加葵花性燥者加黄連寒月少入薑附臨機應變必湏斷厚味又方用良薑芍藥黄栢二錢各燒灰入椿樹皮末一兩半右為末粥為丸毎服三四十丸痰氣𢃄下者蒼术香附滑石蛤粉半夏茯苓婦人上有頭風鼻涕下有白𢃄南星蒼术黄栢炒焦滑石半夏川芎辛夷牡蠣粉炒茯苓白𢃄兼痛風半夏茯苓川芎陳皮甘草蒼术炒浸南星牛膝酒洗黄栢酒浸晒乾炒子嗣肥盛婦人不能孕育者以其身中脂膜閉塞子宮而致經事不能行可用導痰湯之類痩怯婦人不能孕育者以子宫無血精氣不聚故也可用四物湯養血養隂等藥産前胎動孕婦人因火動胎逆上作喘者急用條黄芩香附之類將條芩更於水中沉取重者用之固胎地黄半錢人參白芍各一錢白术一錢半川芎歸身尾一錢半陳皮一錢甘草二錢糯米十四粒黄連些少黄栢些少桑上羊兒藤七葉完者右㕮咀煎湯服之血虚不安者用阿膠痛者縮砂行氣故也一切病不可表惡阻從痰治戴云惡阻者謂婦人有孕惡心阻其飲食者是也肥者有痰痩者有熱多用二陳湯或白术為末水丸隨所好或湯或水下婦人懐姙愛物乃一藏之虚假如肝蔵虚其肝氣止能生胎無餘物也血塊死血食積痰飲成塊在兩脇動作腹鳴嘈雜胘暈身熱時作時止黄連一兩一半用茱茰炒去茱茰一半益智炒去益智山梔半兩炒台芎半兩香附一兩用童便浸蘿蔔子一兩半炒山查一兩三稜青皮神麴各半兩莪术半兩用米醋煮桃仁半兩留尖去皮白芥子一兩半炒瓦龍子消血塊為末作丸子服之一婦人血塊如盤有孕難服峻削香附四兩醋煮桃仁一兩去皮尖海石二兩醋煮白术一兩為末神麴為丸束胎束胎丸第八箇月服黄芩酒炒夏用一兩秋用七錢半冬用半兩茯苓七錢半陳皮二兩忌火白术二兩粥為丸束胎散即達生散人參半錢陳皮半錢白术白芍歸身尾各一錢甘草二錢炙大腹皮三錢紫蘇半錢或加枳殻砂仁作一貼入青葱五葉黄楊木葉稍十箇煎待於八九箇月服十數貼甚得力或夏加黄芩冬不必加春加川芎或有别證以意消息第九箇月服黄芩一兩酒炒宜熱藥不宜凉藥怯弱人减半白术一兩枳殻七錢半炒滑石七錢半臨月十日前小便多時减此一味右為末粥為丸如梧桐子大毎服三十丸空心熱湯下不可多恐損元氣安胎白术黄芩炒麵粥為丸黄芩安胎乃上中二焦藥能降火下行縮砂安胎治痛行氣故也益母草即茺蔚子治産前産後諸病能行血養血難産作膏地黄膏牛膝膏胎漏氣虚血虚血熱戴云胎漏者謂婦人有胎而血漏下者子腫濕多戴云子腫者謂孕婦手足或頭靣通身浮腫者是也用山梔炒一合米飲湯吞下三因方中有鯉魚湯難産難産之由亦是八九箇月内不謹者氣血虚故亦有氣血凝滯而不能轉運者催生方白芷灰滑石百草霜右為末芎歸湯或薑汁調服之治胎衣不下婦人大全方别有藥産後血暈虚火戴血漸漸暈來用鹿角燒灰出火毒研為極細末以好酒調灌下即醒行血極快也又方用韭葉細切盛於有嘴瓶中以熱醋沃之急封其口以嘴塞産婦鼻中可愈眩暈産後補虚人參白术各二錢黄芩陳皮川芎各半錢歸身尾半錢甘草一錢炙有熱加生薑三錢茯苓一錢必用大補氣血雖有雜證以末治之當清熱補血氣消血塊滑石三錢沒藥一錢麒麟竭一錢無則用牡丹皮為末醋糊作丸瓦龍子能消血塊泄川芎黄芩白术茯芩乾薑滑石白芍炒陳皮㕮咀煎湯服惡露不盡謂産後敗血所去不盡在小腹作痛五靈脂香附末蛤粉醋丸甚者入桃仁不去尖如惡血不下以五靈脂為末神麴糊丸白术陳皮湯下中風不可作風治切不可以小續命湯服之必大補氣血然後治痰當以左右手脉分其氣血多少而治口眼喎斜不可服小續命湯發熱惡寒大發熱必用乾薑輕用茯苓淡渗其熱一應苦寒熱發表藥皆不可用也纔見身熱便不可表發熱惡寒皆是氣血左手脉不足補血藥多於補氣藥右手脉不足補氣藥多於補血藥惡寒發熱腹滿者當去惡血腹滿者不是腹痛者是産後不可下白芍以其酸寒伐生發之氣故也産後一切病皆不可發散小兒科小兒食積痰熱傷乳為病大槩肝與胆病多小兒肝病多及大人亦然肝只是有餘腎只是不足吐瀉黄疸三稜莪术陳皮青皮神麴麥芽甘草白术茯苓黄連右為末水調服傷乳吐瀉者加山查時氣吐㵼者加滑石發熱者加薄荷吐瀉用益元散錢氏五補五瀉之藥俱可用急慢驚風發熱口瘡手心伏熱痰熱痰喘痰嗽並用通法重則用𤓰蒂散輕則用苦參赤小豆末湏酸虀汁調服吐之後用通聖散蜜丸服之驚有二證一者熱痰主急驚當直瀉之一者脾虚乃為慢驚所主多死當養脾東垣云慢驚者先實脾土後散風邪急者只用降火下痰養血慢者只用硃砂安神丸更於血藥中求之黑龍丸牛膽南星礞石各一两熖硝等分煆天竺黄青黛各半兩蘆薈二兩半硃砂三錢僵蚕五分蜈蚣二錢半火燒存性右為細末煎甘草湯膏丸如雞頭大每服一丸或二丸急驚薄荷湯下慢驚桔梗白术湯下神聖牛黄奪命散㯽榔半兩木香三錢大黄二兩麺褁煨熟為末黒牽牛麄末一半生用一半炒用右為一處研作細末入輕粉少許毎服二錢用蜜漿水調下不拘時候微利為度疳病胡黄連丸胡黄連半錢去果積阿魏一錢半醋煮去果積麝香四粒神麯二錢半去食積黄連二錢半炒去食積右為末猪膽汁丸如黍米大毎服二十丸白术湯下小兒疳病腹大黃連丸二十丸白术湯下痘瘡分氣虚血虛補之氣虛用人參白术加解毒藥但見紅㸃便忌升麻葛根湯發得表虛也吐瀉少食為裏虛不吐瀉能食為實裏食而補則結癰腫䧟伏倒靨灰白為表虛或用燒人屎黑䧟甚者燒人屎紅活綻凸為表實而後用表藥則要潰爛不結痂二者俱見為表裏俱虚痘瘡或初出或未出時人有患者宜預服此藥多者合少重者合輕方用絲𤓰近蒂三寸連𤓰子皮燒灰存性為末砂糖拌喫入硃砂末亦可解痘瘡毒藥絲𤓰升麻酒芍藥甘草生用糖毬黒荳犀角赤小豆解痘瘡法已出未出皆可用硃砂為末以蜜水調服多者可减少者可無腹脹蘿蔔子蒸紫蘇梗陳皮乾薑各等分甘草减半食减者加白术煎服夜啼人參一錢半黃連一錢半姜汁炒甘草半錢竹葉二十片作二服加薑一片煎服之口糜戴云謂滿口生瘡者便是江茶粉草傅之又方苦參黃丹五倍子青黛各等分傅之脫囊腫大戴云脫嚢者隂嚢腫大墜下不收上之說木通甘草黃連當歸黃芩煎服脫嚢紫蘇葉為末水調𫝊上荷葉褁之脫肛戴云脫肛者大腸脫下之說東北方陳壁上土湯泡先薫後洗亦可脫嚢用藥服之木舌戴云木舌者舌腫硬不和軟也又言重舌者亦是此類二者盖是熱病用百草霜滑石芒硝為末酒調敷癮疹黒斑紅斑瘡癢用通聖散調服咯紅戴云咯紅者即唾内有血非吐血與咳血黒荳甘草陳皮煎服喫泥胃熱故也軟石膏甘草黃芩陳皮茯苓白术煎服痢疾食積黃芩黃連陳皮甘草煎服赤痢加紅花桃仁白痢加滑石末食積痢炒麴蒼术滑石芍藥黃芩白术甘草陳皮茯苓右㕮咀煎下保和丸解顱乃是母氣虚與熱多耳戴云即初生小兒頭上骨未合而開者右以四君子湯四物湯有熱加酒芩炒黃連生甘草煎服外以帛束𦂳用白歛末敷之蚘䖝練樹根為君佐以二陳湯煎服口噤欝金藜蘆𤓰蒂為末搐鼻風痰南星半两切白礬半兩入器中水髙一指浸晒乾研細末入白附子二两用飛白麵為丸如鷄頭大每服一丸或二丸薑蜜薄荷湯化下服之癩頭用紅炭焠長流水令熱洗之又服酒製通聖㪚除大黃酒炒外以胡荽子伏龍肝懸龍尾黃連白礬為末調敷又方用松樹厚皮燒灰二两白膠香熬沸傾石上二两黃丹一两飛白礬半两火飛軟石膏一两黃連半两大黃五錢輕粉四盝右極細末熬熟油調敷瘡上須先洗了瘡口敷乃佳赤溜生地黃木通荆芥苦藥帶表之類用巴蕉油塗患䖏鼻赤雄黃黃丹同敷一小兒好喫粽成腹痛黄連白酒藥為末調服乃愈火豈君相五志俱有論火之為病其害甚大其變甚速其勢甚彰其死甚暴何者盖能燔灼焚熖飛走狂越消爍於物莫能禦之逰行乎三焦虚實之两途曰君火也猶人火也曰相火也猶龍火也火性不妄動能不違道於常以禀位聽命運行造化生存之機矣夫人在氣交之中多動少静欲不妄動其可得乎故凡動者皆属火龍火一妄行元氣受傷勢不两立偏勝則病移他經事非細故動之極也病則死矣經所以謂一水不勝二火之火出於天造君相之外又有厥隂蔵府之火根於五志之内六欲七情激之其火隨起大怒則火起於肝醉飽則火起於胃房勞則火起於腎悲哀動中則火起於肺心為君主自焚則死矣丹溪又啟火出五蔵主病曰諸風掉眩属於肝火之動也諸瘡痛瘍属於心火之用也諸氣憤欝属於肺火之升也諸濕腫滿属於脾火之勝也經所謂一水不勝五火之火出自人為又考内經病機一十九條内舉属火者五諸熱瞀瘈皆属於火諸禁皷慄如䘮神守皆属於火諸氣衝上皆属於火諸燥狂越皆属於火諸病胕腫疼痠驚駭皆属於火而河間又廣其說火之致病者甚多深契内經之意曰喘嘔吐酸暴疰下迫轉筋小便渾濁腹脹火皷之有聲癰疽瘍疹瘤氣結咳吐下霍亂瞀欝腫脹鼻塞齀衂血溢血泄淋閉身熱惡寒戰慄驚惑悲笑譫妄衂衊血汚之病皆少隂君火之火乃真心小腸之氣所為也若瞀瘛暴瘖冐昧躁擾狂越罵詈驚駭胕腫痠疼氣逆上衝禁慄如䘮神守啑嘔瘡瘍喉瘂耳鳴及聾嘔湧溢食不下目昧不明暴注瞤瘈暴病暴死此皆少陽相火之熱乃心包絡三焦之氣所為也是皆火之變見於諸病也謂為脉虚則浮大實則洪數藥之所主各因其属君火者心火也可以濕伏可以水滅可以直折惟黄連之属可以制之相火者龍火也不可以濕折之從其性而伏之惟黄栢之属可以䧏之噫瀉火之法豈止如此虚實多端不可不察以蔵氣司之如黄連瀉心火黄芩瀉肺火芍藥瀉脾火柴胡瀉肝火知母瀉腎火此皆苦寒之味能瀉有餘之火耳若飲食勞倦内傷元氣火不两並為陽虚之病以甘温之劑除之以黄茋人參甘草之属若隂微陽强相火熾盛以乗隂位日漸煎熬為火虚之病以甘寒之劑降之如當歸地黄之属若心火亢極欝熱内實為陽強之病以醎冷之劑折之如大黄朴硝之属若腎水受傷其隂失守無根之火為虚之病以壮水之劑制之如生地黄𤣥參之属若右腎命門火衰為陽脫之病以温熱之劑濟之如附子乾薑之属若胃虚過食冷物抑遏陽氣於脾土為火欝之病以升散之劑發之如升麻乾葛柴胡防風之属不明諸此之類而求火之為病施治何所依據故於諸經集畧其說畧備䖏方之用庶免實實虚虚之禍也氣属陽動作火論悍衛冲和不息之謂氣擾亂妄動變常之謂火當其和平之時外護其表復行於裏周流一身循環無端出入升䧏繼而有常源出中焦緫統於肺氣曷甞病於人也及其七情之交攻五志之間發乖戾失常清者遽變之為濁行者抑遏而反止表失衛護而不和内失徤悍而少䧏營運漸逺肺失主持妄動不已五志厥隂之火起焉上燔肺氣乃病焉何者氣本属陽反勝則為火矣河間有曰五志過極則為火也何後世不本此議而一槩類聚香辛燥熱之劑氣作寒治所據何理且言七氣湯製作其用青皮陳皮三稜蓬术益智官桂甘草遂以為平和可常用通治七情所傷混同一意未喻其藥以治真氣以下諸氣尤有甚焉者兹不復叙况所居之情各各不同且夫經言九氣之變未甞畧而不詳如怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收熱則氣泄驚則氣亂勞則氣耗思則氣結其言治法髙者抑之下者舉之寒者熱之熱者寒之驚者平之勞者温之結者㪚之喜者以恐升之悲者以喜勝之九氣之治各有分别何甞混作寒治論而類聚香熱之藥通言而治諸氣豈理之謂歟若香辛燥熱之劑但可刼滯氣衝快於一時以其氣久抑滯借此暫行開發之意藥中無佐使制伏所起之氣服之甚則増熾欝火蒸薫氣液而成積自積滋長而成痰一飲下隔氣乃氤氲清虚之象若霧露之着物雖滯易㪚内挾痰積開而復結服之日久安有氣實而不動氣動而不㪚者乎此皆人所受誤之由習俗已久相沿而化卒莫能救升發太過香辛散氣燥熱傷氣真氣耗散濁氣上騰猶曰腎虚不能攝氣歸原遂與蘇子䧏氣湯四磨湯下黒鍚丹養氣丹鎮墜上升之氣且流黄黒鍚佐以香熱又無補養之性藉此果能生氣而補腎乎請熟詳之夫濕痰盛甚者亦或當之初服未顯憎變由其喜墜而愈進形質弱者何以收救不悟肺受火炎子氣亦弱䧏令不行火無以制相扇而動本勢空虚命絶如縷積而至深丹毒濟火一旦火氣狂散喘息奔急而死所以有形丹石丸藥重墜無形之氣将何扺受隨而䧏之乎譬以石投水水故未甞沉也豈不死歟丹溪有曰上升之氣自肝而出中挾相火其熱愈甚自覺無冷非無冷也火熱似水積熱之甚陽亢隂微故有此證認假作真似是之禍可勝言哉内經雖云百病皆生於氣以正氣受邪之不一也今七情傷氣欝結不舒痞悶壅塞發為諸病當詳所起之因滯於何經上下部分蔵氣之不同隨經用藥有寒熱温凉之同異若枳殻利肺氣多服損􅎍中至髙之氣青皮瀉肝氣多服損真氣與夫木香之汗中下焦氣香附之快滯氣陳皮之泄氣霍香之馨香上行胃氣紫蘇之散表氣厚朴之瀉衛氣檳榔之瀉至髙之氣沉香之升䧏其氣腦麝之散真氣若此之類氣實可宜其中有行散者有損泄者其過劑乎用之能却氣之標而不能治氣之本豈可又佐以燥熱之藥以火濟火混同謂治諸氣使之常服多服可乎氣之與火一理而已動静之變反化為二氣作火論治與病情相得丹溪發揮論云冷生氣者出於髙陽生之謬言也身非自受寒氣口食寒物而足論寒者吾恐十之無一二也血属隂難成易虧論内經曰榮者水糓之精也和調五蔵洒陳於六腑乃能入於脉也源源而來生化於脾緫統於心蔵於脾肝宣布於肺施泄於腎灌溉一身目得之而能視耳得之而能聽手得之而能攝掌得之而能握足得之而能歩蔵得之而能液腑得之而能氣是以出入升䧏濡潤宣通者由此使然也注之於脉少則濇充則實常以飲食日滋故能陽生隂長取汗變化而亦為血也生化旺則諸經恃此而長養衰耗竭則百脉由此而空虚可不謹養哉故曰血者神氣也持之則存失之則亡是知血盛則形盛血弱則形衰神静則隂生形役則陽亢陽盛則隂必衰又何言陽旺而生隂血也盖謂血氣之常隂從乎陽隨氣運行於内而無隂以覊束則氣何以樹立故其致病也易而調治也難以其比陽常虧而又損之則陽易亢隂易乏之論可以見矣諸經有云陽道實隂道虚陽道常饒隂道常乏陽常有餘隂常不足以人之生也年至十四而經行至四十九而經斷可見隂血之難成易虧知此隂氣一虧傷所變之證妄行於上則吐衂衰涸於外則虚勞妄返於下則便紅稍有熱則膀胱癃閉溺血滲透腸間則為腸風隂虚陽摶則為崩中濕蒸熱瘀則為滯下熱極腐化則為膿血火極似水血色紫黒熱盛於隂發於瘡瘍濕滯於血則為痛癢癮疹皮膚則為冷痺畜之在上則人喜忘畜之在下則為喜狂墮恐跌仆則瘀惡内凝若分部位身半已上同天之陽身半已下同地之隂此特舉其所顯之證者治血必血属之藥欲求血藥其四物之謂乎河間謂隨證輔佐謂之六合湯者詳言之矣余故陳其氣味專司之要不可不察夫川芎血中之氣藥也通肝經性味辛散能行血滯於氣也地黄血中血藥也通腎經性味甘寒能生真隂之虚也當歸分三治血中主藥通腎經性味辛温全用能活血各歸其經也芍藥分隂藥也通脾經性味酸寒能和血氣腹痛也若求隂藥之属必於此而取則焉脾胃論有云若善治者隨經損益損其一二味之所宜為主治可也此特論血病而求血藥之属者也若氣虚血弱又當從長沙血虚以人參補之陽旺則生隂血也若四物者獨能主血分受傷為氣不虚也輔佐之属若桃仁紅花蘇木血竭牡丹皮者血滯所宜蒲黄阿膠地榆百草霜櫚灰者血崩所宜乳香沒藥五靈脂凌霄花者血痛所宜蓯蓉𤨏陽牛膝枸把子益母草夏枯草敗龜板者血虚所宜乳酪血液之物血燥所宜乾薑桂者血寒所宜生地黄苦參血熱所宜此特取其正治之大畧耳以其觸類而長可謂無窮之應變矣滯下辯論滯下之病甞見世方以赤白而分寒熱妄用兠澁燥劑止之或言積滯而行巴碙丸藥攻之或指濕熱而與淡滲之劑利之一偏之誤可不明辯乎謹按原病式所論赤白同於一理反復陳喻但不熟察耳果腸胃積滯不行法當辛苦寒凉藥推陳致新蕩滌而去不宜巴碙毒熱下之否則欝結轉甚而病變危者有之矣若瀉痢不分兩證混言濕熱不利小便非其治也夫泄者水糓濕之象滯下者垢瘀之物同於濕熱而成治分兩岐而藥亦異若淡滲之劑功能散利水道濁流得快使泄自止此有無之形豈可與滯下混同論治而用導滯行積可乎其下痢出於大腸傳送之道了不干於腎氣所下有形之物或如魚腦或下如豆汁或便白膿或下純血或赤或白或赤白相雜若此者豈可與瀉混同論治而用淡滲利之可乎甞原其本皆由腸胃日受飲食之積餘不盡行留滯於内濕蒸熱瘀欝結日深伏而不作時逢炎暑不行相火司令又調攝失宜復感酷熱之毒至秋陽氣始收火氣下䧏蒸發畜積而滯下之證作矣以其積滯之滯行故名之曰滯下其濕熱瘀積干於血分則赤干於氣分則白赤白兼下氣血俱受邪矣久而不愈氣弱不運脾積不磨陳積脱滑下凝猶若魚腦矣甚則腸胃空虚闗司失守濁液井流色非一類錯雜混下注出狀如豆汁矣若脾氣下䧟虚坐努責便出色如白膿矣其熱傷血深濕毒相瘀粘結紫色則紫黒矣其汚濁積而欲出氣滯而不與之出所以下迫窘痛後重裏急至圊而不能便緫行頻併亦少乍止乍起而不安此皆大腸經有所壅遏窒碍氣液不得宣通故也衆言難處何法則可求之長沙論云利之可下者悉用大黄之劑可温者悉用薑附之類何甞以巴碙熱毒下之𦂳澁重欲兠之又觀河間立言後重則宜下腹痛則宜和身重則宜温脉弦則去風膿血粘稠以重藥竭之身冷自汗以重藥温之風邪内縮宜汗之鶩溏為痢當温之在表者汗之在裏者下之在上者湧之在下者竭之身表熱者内踈之小便澁者分利之用藥輕重之别又加詳載行血則便自愈調氣則後重自除治實治虚之要論而丹溪又言大虚大寒者其治驗備載局方發揮觀此諸法豈可膠柱而調瑟又有胃弱而閉不食此言禁口痢病七方未有詳論者以内經大法推之内格嘔逆火起炎上之象究乎此則胃虚木火乘之是土敗木賊也見此多成危候三焦之疾燥熱勝隂甞讀劉河間先生三消之論始言天地六氣五味以配養人身六位五蔵而究乎萬物之源終引内經論渇諸證以辯乎世方熱藥之悮此比物立象反復詳明非深達隂陽造化之機者孰能如是邪請陳其畧夫經中有言心肺氣厥而渇者有腎熱而渇者有言胃與大腸結熱而渇者有因脾痺而渇者有因小腸痺熱而渇者有因傷飽肥甘而食渴者有因醉飽入房而渇者有因逺行勞倦遇天熱而渇者有因傷害胃乾而渇者有因腎熱而渇者有因痛風而渇者雖五蔵之部分不同而病之所遇各異其功燥熱之液一也三消之熱本濕寒之隂氣衰燥熱之陽氣大甚皆因乎飲食之餌失節腸胃乾涸而氣液不得宣平或耗亂精神過違其度或因大病隂氣損而血液衰虚陽氣悍而燥熱欝甚或因久嗜醎物恐食炙􅏼飲食過度亦有年少服金石丸散積久實熱結於下焦虚熱血氣不能制實熱燥甚於腎故渇而不飲若飲水多而小便多者名曰消渇若飲食多而不甚渇小便數而消痩者名曰消中若渇而飲水不絶腿消痩而小便有脂液者名曰腎消此三消者其燥熱同也故治疾者補腎水隂寒之虚而瀉心火陽熱之實除腸胃燥熱之甚濟身津液之衰使道路散而不結津液生而不枯氣血利而不澁則病日已矣豈不以滋潤之劑養隂以制燥滋水而克液哉何故泄漏消渇多者不知其書謂因下部腎水虚不能制其上焦心火使上實熱而多煩渇下虚冷而小便若更服寒藥則元氣轉虚而下部腎水轉衰則上焦心火尤難治也但以煖藥補養元氣若下部腎水得實而勝退上焦心火則自然渇止小便如常而病愈也吁若此未明隂陽虚實之道也夫腎水属隂而本寒虚則為熱心火属陽而本熱虚則為寒若腎水隂虚則心火陽實是謂陽實隂虚而上下俱熱矣以彼人言但見消渇數溲妄言為下部寒爾豈知腸胃燥熱怫欝使之然也且夫寒物属隂能養水而瀉心熱物属陽能養火而耗水今腎水既不能勝心火則上下俱熱奈何以熱養腎水欲令勝心火豈不闇哉彼不謂水氣實者必能制火虚則不能制火故陽實隂虚而熱燥其液小便淋而常少隂實陽虛不能制水小便利而常多此又不知消渇小便多者盖燥熱太甚而三焦腸胃之勝理怫欝結滯緻宻壅塞而水液不能滲泄浸潤於外以養乎百骸故腸胃之外燥熱太甚雖多飲水入於腸胃之内終不能浸潤於外故渇不止而小便多水液既不能滲泄浸潤於外則隂燥竭而無以自養故久而多變為聾盲瘡瘍痤疿之類而危殆其為燥熱傷隂也明矣泄瀉從濕治有多法泄瀉者水瀉所為也由濕本土土乃脾胃之氣也得此證者或因於内傷或感於外邪皆能動乎脾濕脾病則升舉之氣下䧟濕變注并出大腸之道以胃與大腸同乎陽明一經也云濕可成泄垂教治濕大意而言後世方論泥云治濕不利小便非其治也故凢泄瀉之藥多用淡滲之劑利之下久不止不分所得之因遽以為寒而用𦂳澁熱藥兠之夫泄有五飱泄者水糓不化而完出濕兼風也溏泄者所下汁積粘垢濕兼熱也鶩泄者所下澄徹清冷小便清白濕兼寒也濡泄者體重軟弱泄下多水濕自甚也滑泄者久下不能禁固濕勝氣脱也若此有寒熱虚實之不同舉治不可執一而言謹書數法於後夫泄有宜汗觧者經言春傷於風夏必飱泄又云久風為飱泄若保命集云用蒼术麻黄防風之属是也有宜下而保安者若長沙言下痢脉滑而數者有宿食也當下之下利己差至其時復發者此為下未盡更下之安悉用大承氣湯加减之劑有宜化而得安者格致餘論夏月患泄百方不効視之久病而神亦瘁小便少而赤脉滑而頗弦格悶食减因悟此久積所為積濕成痰留於肺中宜大腸之不固也清其源則流自清以茱茰等作湯温服一碗許探喉中一吐痰半升如利减一半次早晨飲吐半升而利止有以補養而愈者若脾胃論言脉弦氣弱自汗四肢發熱大便泄瀉從黄茋建中湯有宜調和脾濕而得止者若潔古言曰四肢懶倦小便不利大便走泄沉困飲食减少以白术芍藥茯苓加减治之有宜升舉而安者若試効方言胃中濕脾弱不能運行食下則為泄助甲膽風勝以尅之以升陽之藥𦍑活獨活升麻防風炙甘草之属有宜燥濕而後除者若脾胃論言土濕有餘脉緩怠惰嗜卧四肢不收大便泄瀉從平胃散有宜寒凉而愈者若長沙言恊熱自利者黄芩湯主之舉其濕熱之相宜者若長沙言下利脉遲𦂳痛未欲止當混之下利心痛急當救裏下利清白水液澄徹可與理中四逆湯輩究其利小便之相宜者河間言濕勝則濡泄小便不利者可與五苓散益元散分導之以其收歛之相宜者東垣言寒滑氣泄不固製訶子散澁之以上諸法各有所主宜獨利小便而濕動也豈獨病因寒必待龍骨石脂𦂳重燥毒之属澁之治者又當審擇其説一途取利約而不博可乎金匱鈎𤣥巻三
