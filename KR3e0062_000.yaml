body:
  text: 金匱鈎𤣥醫家類提要臣等謹案金匱鈎𤣥三卷元朱震亨撰明戴原禮校補中稱戴云者原禮說也末附論六篇不列於卷第中一曰火豈君相五志俱有論一曰氣屬陽動作火論一曰血屬隂難成易虧論一曰滯下辨論一曰三焦之疾燥熱勝隂論一曰泄㵼經濕治有多方論皆不題誰作觀其滯下辨論引震亨之言則亦原禮所加也震亨以補隂為宗實開直補真水之先其以鬱治病亦妙闡內經之㫖開諸家無窮之悟雖所用黃柏知母不如後人之用六味圓直達本原所製越鞠丸亦不及後人之用逍遙散和平無弊然蓽路繿縷究以震亨為首庸是書詞㫖簡明不愧鈎元之目原禮所補亦多精確明史方技傳載此書於原禮傳中卷數與今本同稱其附以己意人謂不愧其師其為醫家善本可知矣原禮洪武中御醫本名思恭以字行浦江人朱國禎湧幢小品曰戴元禮國朝之聖醫也太祖稱為仁義人太孫即位拜院使云云元禮即原禮蓋國禎得諸傳聞故音同字異耳乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:c16f8416f87ba64b7872e2cb87c13ad7fb81e0d0fa133ca3960017b1df02d288
