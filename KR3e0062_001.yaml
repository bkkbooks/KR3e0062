body:
  text: 金匱鈎𤣥卷一元朱震亨撰中風大率主血虗有痰以治痰為先或虗挟火與濕亦有死血留滯者外中於風者亦有中氣者當従痰治順氣化痰若口開手散眼合遺尿吐沬直視喉如鼾睡肉脫筋痛者皆不治半身不遂大率多痰在左屬死血無血在右屬痰有熱氣虗在左者四物湯等加桃仁紅花竹瀝薑汁在右者二陳湯四君子等加竹瀝薑汁痰擁盛者口眼喎斜者皆當吐吐法輕用𤓰蒂鰕汁皂角重用藜蘆半錢或三分加麝香灌入鼻内或口内吐痰出一吐不已再吐之亦有虗而不可吐者氣虗卒倒參茋補之氣虛有痰濃參湯合竹瀝薑汁血虗宜四物湯俱用薑汁炒恐泥痰再加竹瀝薑汁入内服䏻食者去竹瀝加荆瀝又法以猪牙皂角白􅈨等分為末薑湯調下名稀涎㪚血虗者四物湯補之挟痰者亦用薑汁竹脉訣内言諸不治證見則不可治筋枯者不治舉動則筋痛者是筋枯以其無血滋潤故也治痰氣實䏻食用荆瀝氣虗少食用竹瀝此二味用開經絡行血氣入四物湯中必用薑汁助之肥白人多濕少用附子烏頭行經初昏倒急掐人中至醒然後用去痰藥二陳湯四物四君子等湯加减用六欝戴云欝者結聚而不得發越也當升者不得升當䧏者不得䧏當變化者不得變化也此為傳化失常六欝之病見矣氣欝者胸脇痛脉沉澁濕欝者周身走痛或闗莭痛遇隂寒則發脉沉細痰欝者動則即喘寸口脉沉滑熱欝者必小便赤脉沉數血欝者四肢無力能食便紅脉沉食欝者噯酸腹飽不能食人迎脉平和氣口脉𦂳盛者是也氣血中和萬病不生一有怫欝諸病生焉氣欝香附子蒼术川芎濕蒼术川芎白芷痰海石香附南星𤓰蒌熱青黛香附蒼术川芎梔子血桃仁紅花青黛川芎香附食蒼术香附針沙醋炒山查神麯炒春加芎夏加苦参秋冬加吴茱茰越鞠丸觧諸欝又名芎术丸蒼术香附撫芎神麯梔子等分為末水丸如菉豆大凡欝皆在中焦以蒼术撫芎開提其氣以升之假如食在氣上提其氣則食自降餘皆倣此癩大風病是受得天地間殺物之氣古人謂之癘風者以其酷烈暴悍可畏耳人得之者須分在上在下夫在上者以醉仙散取涎血於齒縫中出在下者以通天散取惡物陳䖝於榖道中出取出雖有道路之異然皆不外乎陽明一經治此證者須知此意㸔其疙瘩與瘡上先見者上體多者在上也下先見者下體多者在下也上下同得者在上復在下也陽明胃經與大腸無物不受此風之入人也氣受之則在上多血受之則在下多血氣俱受之者上下俱多也自非醫者神手病者鐵心罕有免此夫従上従下以漸而来者皆可治人見其病勢之緩多忽之雖按法施治病已痊可若不能忌口絶色皆不免再發發則終於不能救也余曽治五人中間惟一婦人不再發以其貧甚而且寡無物可喫也餘四人三四年後皆再發孫真人云吾嘗治四五十人終無一人免於死非真人不能治蓋無一人能守禁忌耳此婦人本病藥外又是百餘貼加減四物湯半年之上方得經行十分安愈治法在上者醉仙散在下者通天再造散後用通神散及三稜針於委中出血但不能忌口絶房者不治醉仙散胡麻仁牛旁子蔓荆子枸把子各半兩為粗末同炒紫色白蒺藜苦參𤓰蒌仁防風各半兩右八味為細末毎一兩半入輕粉二錢拌匀大人一錢空心日午臨睡各一服淡茶調下五七日間必於齒縫中出臭涎水渾身覺痛昏悶如醉利下惡臭屎為度量大小虚實加减與之證候重而急者須以再造散下之候補養得還復與此藥喫須斷鹽醬醋諸般魚肉椒料果子燒炙等物止可淡粥及淡煮熟時菜食之茄尚不可食惟有烏稍蛇菜花蛇可以淡酒煮熟食之以助藥力再造散鬱金半兩生用大黃一兩炮皂角刺一兩黒者大者白牽牛頭末六錢半炒半生用右為末五錢臨夜冷酒調下以净桶伺候泄出䖝如䖝口黒色乃是多年䖝口如赤色是近者三數日又進一服直候無䖝即絶根也寒主乎温散有卒中天地之寒氣有口傷生冷之物戴云此傷寒謂身受肅殺之氣口食氷水𤓰果冷物之類病者必脈沈細手足冷息微身倦雖身熱亦不渴倦言語或遇熱病誤用此法輕者至重重者至死凢脈數者或飲水者或煩燥動摇者皆是熱病寒熱二證若水火也不可得而同治誤即殺人學者慎之傷寒傷寒必須身犯寒氣口食寒物者從補中益氣湯中加發散藥屬内傷者十居八九其法邪之所凑其氣必虚只用補中益氣湯中從所見之證出入加減氣虚熱甚者少用附子以行參耆之劑如果氣虚者方可用此法已上傷寒治法可用於南方不宜北暑戴云暑乃夏月炎暑也盛熱之氣著人也有冐有傷有中三者有輕重之分虚實之辨或腹痛水瀉者胃與大腸受之惡心者胃口有痰飲也此二者冐暑也可用黃連香薷飲蓋黃連退暑熱香薷消畜水或身熱頭疼躁亂不寕者或身如針刺者此為熱傷在分肉也當以解毒白虎湯加柴胡氣如虚者加人參或咳𠻳發寒熱盜汗出不止脈數者熱在肺經用清肺湯柴胡天水散之類急治則可遲則不可治矣或火乘金也此為中暑凢治病須要明白辨别慎勿混同施治春秋間亦或有之切莫執一隨病處方為妙黃連香薷飲挾痰加半夏乘虚加人參黃耆或清暑益氣湯加減用注夏屬隂虚元氣不足戴云秋初夏末頭痛脚軟食少體熱者是也補中益氣湯去柴胡升麻加炒黃栢挾痰止用南星半夏陳皮之類或生脈散出千金方暑風戴云暑風者夏月卒倒不省人事者是也有因火者有因痰者火君相二火也暑天地二火也内外合而炎爍所以卒倒也痰者人身之痰飲也因暑氣入而皷激痰飲塞碍心之竅道則手足不知動躡而卒倒也此二者皆可吐内經曰火鬱則發之挾火挾痰實者可用吐法吐即發散也量其虚實而吐之吐醒後可用清劑調治之濕戴云濕有自外入者有自内出者必審其方土之致病源東南地下多隂雨地濕凢受必從外入多自下起以重腿脚氣者多治當汗散久者宜疎通滲泄西北地髙人多食生冷濕麵或飲酒後寒氣怫鬱濕不能越作腹皮脹痛甚則水皷脹滿或通身浮腫如泥按之不起此皆自内而出也辨其元氣多少而通利其二便責其根在内也此方土内外亦互相有之但多少不同須對證施治不可執一本草蒼术治濕上下俱可用二陳湯加酒芩羌活蒼术散風之藥行濕最妙内傷内傷病退後燥渴不解者有餘熱在肺家可用參苓甘草少許薑汁冷服或茶匙挑薑汁與之虚者可用人參湯試之病此者為多但有挾痰者有挾外邪者有熱鬱於内而發者皆以補元氣為主看其所挾之病而兼用藥火有可發者二風寒外來者可發鬱者可發隂虚火動難治火鬱當發看何經輕者可降重則從其性升之實火可瀉小便降火極速凢氣有餘便是火火急甚重者必緩之生甘草兼瀉兼緩人參白术亦可人壯氣實火盛顛狂者可用正治或硝水氷水飲之人虚火盛狂者可用生薑湯與之若投以氷水正治立死有補隂即火自降者炒黃栢地黃之類山梔子仁大能降火從小便泄去其性能屈曲下行降火人所不知凢火盛者不可驟用凉藥必用溫散又方左金丸治肝火黃連六兩茱茰一兩或半兩水丸白湯下五十丸傷風戴云新咳𠻳鼻塞聲重者是也屬肺者多散宜辛温或辛涼之劑發斑屬風熱戴云斑有色㸃而無頭粒是如有頭粒者即疹也風熱挾痰而作自裏而發於外通聖散消息當以微汗以散之下之非理也内傷斑者胃氣極虚一身火逰行於外所致宜補以降之發斑似傷寒者痰熱之病發於外微汗以散之下之非理也疹戴云疹浮小有頭粒者是隨出即收收則又出者是也非若斑之無頭粒也當明辨之屬熱與痰在肺清肺火降痰或解散出汗亦有可下者温疹衆人病一般者是也又謂之天行時疫有三法宜補宜降宜散又方大黃黃芩黃連人參桔梗防風蒼术滑石香附人中黃右為末神麴為丸五六十丸分氣血痰作湯使氣虚四君子湯血虚四物湯痰多二陳湯送下如熱甚者可用童子小便送下大頭天行病東垣有方𦍑活酒芩大黃酒蒸冬温為病非其時而有其氣者冬時君子當閉藏而反發泄於外専用補藥帶表又方以竹筒兩頭留節中作一竅納甘草於中仍以竹木釘閉竅於大糞缸中浸一月取出晒乾治疫毒瘧有風有暑有食老瘧瘧母痰病老瘧病此係風暑入隂分在臟用血藥川芎撫芎紅花當歸加蒼术白术白芷黃栢甘草煎露一宿次早服之無汗要有汗散邪為主帶補有汗要無汗正氣為主帶散有瘧母者用丸藥消導醋煮鱉甲為君三稜蓬术香附隨證加減三日一發者受病一年間發者受病半年一日一發者受病一月連二日發者住一日者氣血俱受病一日間一日者補藥帶表藥後用瘧丹截之在隂分者用藥徹起在陽分方可截又方草果知母㯽榔烏梅常山甘草炙川山甲炮用水酒一大碗煎至半碗露一宿臨發時前二時温服如吐則順之截瘧青蒿丸青蒿一兩冬青葉二兩馬鞭草二兩官桂二兩右三葉皆晒乾秤為末法丸如胡椒子大毎兩作四服於當發前一時服盡大法暑風必當發汗夏月多在風凉處歇遂閉其汗而不泄因食者從食上治瘧而虚者須先用參术一二貼托住其氣不使下陷後用他藥治内傷挾外邪者同法内必主痰必以汗解二陳湯加常山柴胡黃芩草果瘧而甚者發寒熱頭痛如破渴而飲水自汗可與參耆术芩連梔子川芎蒼术半夏等治久病瘧二陳湯加川芎蒼术柴胡葛根白术一補一發咳嗽風寒火主降火勞肺脹火鬱痰主降痰戴云風寒者鼻塞聲重惡寒者是也火者有聲痰少面赤者是也勞者盜汗出兼痰者多作寒熱肺脹者動則喘滿氣急息重痰者嗽動便有痰聲痰出嗽止五者大槩耳亦當明是否也風寒行痰開腠理二陳湯加麻黃杏仁桔梗火降火清金化痰勞四物湯中加竹瀝薑汁必以補隂為主肺脹而𠻳者用柯子青黛杏仁柯子能治肺氣因火傷極遂成鬱遏脹滿取其味酸苦有收歛降火之功佐以海蛤粉香附𤓰蔞青黛半夏麴食積痰作𠻳發熱者半夏南星為君𤓰蔞蘿蔔子為臣青黛石鹻為使火鬱𠻳者柯子海石𤓰蔞青黛半夏香附咳𠻳聲嘶者此血虚受熱也用青黛蛤粉蜜調服久𠻳風入肺用鵞管石雄黃鬱金欵冬花碾末和艾中以生薑一片留舌上炙之以烟入喉中為度乾咳𠻳者難治此係火鬱之證乃痰鬱火邪在中用苦梗以開之下用補隂降火不已則成勞倒倉法此證不得愈者用之𠻳而脇痛宜疎肝氣用青皮等方在後二陳湯加南星香附青黛薑汁治𠻳藥大槩多用生薑者以其辛散也上半日𠻳多者屬胃中有火貝母石膏能降胃火午後𠻳多者此屬隂虚必用四物湯加知母黃栢先降其火五更𠻳多者此胃中有食積至此時候流入肺金知母地骨皮降肺火火氣浮於肺者不宜用凉藥用五味五倍飲而降之有痰因火逆上者先治火後治其痰肺虚甚者用參膏此好色腎虚有之以生薑陳皮佐之大槩有痰者可加痰藥治之治𠻳多用粟殻不必疑但要先去病根此乃收後之藥也師云隂分𠻳者多屬隂虚治之有𠻳而肺脹壅遏不得眠者難治治𠻳烟筒佛耳草欵冬花鵝管石右為末用紙捲燒其烟薫之或白湯調亦得治𠻳有痰天突肺腧二穴炙治𠻳泄火熱大瀉肺氣三椎骨下橫過各一寸半是穴𠻳春是春升之氣用清藥二陳加薄荆之類夏是火炎上最重芩連秋是濕熱傷肺冬是風寒外來用藥發散之後以半夏必逐去痰庶不再來又方治𠻳刼藥五味子半兩五倍子一錢甘草二錢半風化硝一錢為末以蜜為丸噙化之痰脈浮當吐凢治痰用利藥過多致脾氣下虚則痰反易生多也温痰用蒼术老痰海石半夏𤓰蔞香附五倍子熱痰用青黛黃連食積痰神麴麥蘖山查子痰在腸胃間者可下而愈痰在經絡中者非吐不可出吐法中就有發散之義也膈上之痰必用吐之瀉亦不能去也氣實痰熱結在上者則吐吐難得出或成塊或吐咯不出氣滯兼鬱者此則難治矣膠固者必用吐之吐法兼用牙茶虀水薑汁醋少許𤓰蔞散少許加防風桔梗皆升動其氣便吐也吐法用附子尖桔梗蘆人參蘆𤓰蒂砒不甚用藜蘆艾葉末茶右藥此皆自吐不用手探但藥但湯皆可吐吐法先以布搭膊勒腰於不通風處行此法蘿蔔子半升擂和以漿水一碗濾去滓入少油與蜜旋至半温服後以鵞翎探吐凢用鵞翎須以桐油浸即以皂角水洗去肥晒乾用之又法用蝦帶殻半斤入醬葱薑等料物煮汁先喫蝦後飲汁以翎勾引吐必須𦂳勒肚腹二陳湯一身之痰都能管如在下加下引藥如在上加上引藥凢人身上中下有塊者多是痰也問其平日好食何物吐下後用藥許學士用蒼术治痰飲成窠囊一邊行極効痰挾瘀血遂成窠囊痰之清者屬寒用二陳湯之類内傷挾痰必用人參黃耆白术之屬多用薑汁𫝊送或用半夏之屬虚甚者宜加竹瀝痰熱者多挾風外證為多濕者多軟如身倦而重之類熱者清之食積者必用攻之兼氣虚者用補氣藥送因火盛逆上者治火為先白术黃芩石膏之類中氣不足則加人參白术痰之為物隨氣升降無處不到脾虚者清中氣二陳加白术之類兼用提藥中焦有痰與食積胃氣賴其所養卒不便虚若攻之盡則虚矣眩暈嘈雜乃火動其痰用二陳湯加梔子芩連之類噫氣吞酸此係食鬱有熱火氣上動以黃芩為君南星半夏為臣橘紅佐之熱多者加青黛痰在脇下非白芥子不能達痰在皮裏膜外者非薑汁竹瀝不可達痰在膈間使顛狂健忘宜用竹瀝風痰亦服竹瀝又又能養血痰在四肢非竹瀝不開痰結核在咽喉燥不能出入化痰藥加軟堅醎藥味杏仁海石桔梗連翹𤓰蔞仁少佐樸硝以薑汁蜜調丸噙化之海粉即海石熱痰能降濕痰能燥結痰能軟頑痰能消可入丸子末子不可入煎藥黃芩治熱痰假以降其熱也竹瀝可滑痰非薑汁不能行經絡也枳實瀉痰能衝牆壁五倍子能治老痰小胃丹治膈上痰熱風痰濕痰肩膊諸痛然能損胃氣食積痰實者用之不宜多青礞石丸去濕痰重在風化硝潤下丸降痰最妙陳皮半斤去白以水化鹽半兩拌陳皮令得所煮候乾炒燥一方不去白甘草一兩右為末蒸餅丸菉荳大毎服三十五丸温水送下油炒半夏大治濕痰又治喘止心痛粥丸薑湯下三十丸痰方黃芩空心香附半夏薑製貝母已上治濕痰加𤓰蔞仁青黛作丸子治熱痰中和丸治濕痰氣熱蒼术黃芩香附半夏各等分為末粥丸燥濕痰方亦治白濁因痰者南星一兩半夏一兩蛤粉二兩青黛為衣右為末神麴糊丸痰𠻳方黃芩一兩半酒浸洗滑石半兩貝母一兩南星一兩風化硝二錢半白芥子半兩去殻右為末湯浸蒸餅為丸導痰湯半夏四兩南星橘皮枳殻赤茯苓一兩甘草半兩用生薑煎服千緡湯半夏七枚泡製四片破之皂角去皮炙一寸二分甘草炙一寸生薑如大指煎服治喘治痰方南星半夏滑石輕粉各三錢巴豆三十粒吳茱茰三兩黃連八兩粥為丸軟石膏碾末醋丸如菉荳大瀉胃火食積痰噯氣胃中有火有痰南星半夏軟石膏莎草根或湯或丸吞酸戴云濕熱在胃口上飲食入胃被濕熱鬱遏其食不得𫝊化故作酸也如榖肉在器濕熱則易為酸也必用茱茰順其性而折之反佐茱茰黃連嘈雜只是痰因火動戴云此即俗謂之心嘈也梔子薑炒黃連不可無梔子黃芩為君南星半夏橘皮熱多加青黛肥人嘈雜二陳湯加撫芎用蒼术白术炒梔子五疸不用分五同是濕熱如盫麴相似戴云五疽者週身皮膚并眼如梔子水染因食積黃者量其虚實下其食積其餘但利小便為先小便利白即黃自退輕者小温中丸重者大温中丸熱多者加黃連濕多者茵蔯五芩散加食積藥消渴泄瀉先用白术白芍藥炒為末調服後却服消渴藥消渴養肺降火生血為主分上中下治黃連末天花粉末人乳生藕汁生地黃汁右二物汁為膏入上藥捜和佐以薑汁和蜜湯為膏徐徐留於舌上以白湯少許送下能食加軟石膏𤓰蔞根治消渴神藥水腫戴云水腫者通身皮膚光腫如泡者是也以健脾滲水利小便進飲食元氣實者可下此因脾虚不能制水水積妄行當以參术補脾氣得實則自能健運自能升降運動其樞機則水自行非五苓之行水也宜補中行濕利小便水切不可下二陳湯加白术人參為主佐以蒼术炒梔子治積方用鷄子略敲殻損膜不損浸扵尿缸内三四日夜取出煮熟食之効蓋雞子能去風痰痢身熱後重腹痛下血戴云痢雖有赤白二色終無寒熱之分通作濕熱治但分新舊更量元氣用藥與赤白帶同身熱挾外感不惡寒小柴胡湯去人參惡寒發熱為表證宜微汗和解蒼术川芎陳皮芍藥甘草生薑煎服後重積與氣鬱墜下兼升兼消或氣行血和積少但虚坐努力此為亡血倍用歸身尾却以生芍藥生地黄桃仁佐之復以陳皮和之或下痢而大孔痛者此因熱流扵下也用木香㯽榔黃芩黃連炒乾薑或纒退减十之七八積已盡糟粕未實當炒芍藥炒白术炙甘草陳皮茯苓湯下固腸丸三十粒然固腸丸性燥有去濕實腸之功恐滯氣未盡者不可遽用此藥只宜單服此湯可也或痢後糟粕未實或食稍多或饑甚方食腹中作痛者切勿驚恐以白术陳皮各半盞煎服和之則安或久痢後體虚氣弱滑瀉不止又當以柯子肉豆蔲白礬半夏之類擇用以澁之甚則加牡蠣然須以陳皮為佐若大澁亦能作痛又甚者炙天樞氣海古方用厚朴為瀉凝滯之氣然朴太温而散氣久服大能虚人滯氣稍行即去之餘滯未盡以炒枳殻陳皮然枳殻亦能耗氣比之厚朴少緩比陳皮亦重滯退一半當去之只用陳皮以和諸藥陳皮去白有補瀉之兼才若為參术佐亦能補也凡痢疾腹痛必以白芍藥甘草為君當歸白术為佐惡寒痛者加桂惡熱痛者加黃栢達者更能叅以嵗氣時令用藥則萬舉萬全豈在乎執方而已哉諸不治證下痢純血者必死下痢如塵腐色者死下痢如屋漏者死下痢如竹筒注者不可治下痢如魚腦者半生半死噤口痢胃口熱甚故也黃連多加人參煮湯終日呷之如吐了再喫開以降之人不知此多用温藥甘味此以火濟火以滯益滯哀哉一方臍中用田螺盫之以引下其熱亦有誤服熱藥澁藥毒之犯胃者當明審以祛其毒痢方亦作丸大黃黃連黃芩黃栢枳殻當歸白芍藥滑石甘草桃仁白术各等分為末神麴糊丸孫郎中因飲水過多腹脹瀉痢帶白蒼术白术厚樸茯苓滑石右煎服保和丸小兒八嵗下痢純血以食積治蒼术白术黃芩白芍滑石茯苓甘草陳皮炒麴煎下保和丸又下痢法熱不止者屬隂虚用寒凉藥兼升藥熱藥泄瀉濕氣虚火痰食積戴云凡瀉水腹不痛者是濕也飲食入胃不住或完谷不化者是氣虚也腹痛瀉水腹鳴痛一陣瀉一陣是火也或瀉時或不瀉或多或少是痰也腹痛甚而瀉瀉後痛减者是食積也濕燥濕兼滲泄之四苓散加蒼术白术甚者二术炒氣虚人參白术芍藥炒升麻火宜伐火利小水黃芩木通入四苓散痰􅍬宜豁之海石青黛黃芩神麴蛤粉或用吐法食積宜消導疎滌之神麴大黃已上諸藥皆作丸子服之凡泄瀉水多者仍用五苓散治之世俗類用澁藥治痢與瀉若積久而虚者或可行之而初得之者恐必變他疾為禍不小矣殊不知多因於濕惟分利小水最為上䇿止瀉方肉荳蔲五錢滑石春冬一兩二錢半夏一兩半秋二兩又方薑麴丸陳麴六兩炒陳麥亦可茴香五錢生薑一兩右炒白术炒麴炒芍藥或丸或散或湯作丸子切當脾泄治一老人奉養太過飲食傷脾常常泄瀉亦是脾泄白术二兩炒白芍藥一兩酒拌炒神麴一兩半炒山查一兩半炒半夏一兩洗黃芩五錢炒右為末荷葉包飯燒為丸治一老人年七十面白脉弦數獨胃脈沈滑因飲白酒作痢下血淡水膿後腹痛小便不利裏急後重參术為君甘草滑石㯽榔木香蒼术最少下保和丸二十五丸第二日前證俱减獨小便不利以益元散服之霍亂戴云霍亂者吐也有聲有物凡有聲無物而躁亂者謂之乾霍亂也轉筋不住男子以手挽其隂女子以手牽其乳近兩傍邊此乃千金妙法也内有所積外有所感陽不升隂不降乖隔而成矣切勿與米湯喫之立死脈多伏為絶見成吐瀉還用吐提其氣起大法生薑理中湯最好有可吐者有可下者吐用二陳湯加减亦可或梓樹木煎湯吐亦可乾霍亂此病最難治死在須㬰升降不通故也此係内有物所傷外有邪氣所遏有用吐法者則兼發散之義也吐提其氣極是良法世多用鹽湯有用温藥解散者其法解散不用凉藥二陳湯加和解散川芎防風蒼术白芷嘔吐凢有聲有物謂之嘔吐有聲無物謂之噦有痰隔中焦食不得下者有氣逆者有寒氣鬱於胃口者胃中有痰有熱然胃中有火與痰而致嘔吐者多朱奉議以半夏生薑橘皮為主孫真人誤以噦為咳逆劉河間謂吐者火氣炎上此特一端耳胃中有熱膈上有痰二陳湯加炒梔子黃連生薑久病嘔者胃虚不納榖也生薑人參黃耆白术香附惡心有熱有痰有虚戴云惡心者無聲無物但心中欲吐不吐欲嘔不嘔雖曰惡心非心經之病其病皆在胃口上宜用生薑蓋能開胃豁痰也皆用生薑隨證用藥翻胃即膈噎膈噎乃翻胃之漸發揮備言戴云翻胃有四血虚氣虚有熱有痰血虚者脈必數而無力氣虚者脈必緩而無力氣血俱虚者則口中多出沫但見沬大出者必死有熱者脈數而有力有痰者脈滑數二者可治血虚者四物為主氣虚者四君子為主熱以解毒為主痰以二陳為主大約有四血虚氣虚有熱有痰兼病必用童便竹瀝薑汁牛羊乳糞如羊屎者斷不可治大腸無血故也痰用二陳湯為主寸闗脈沈或伏而大有氣滯結者通氣之藥皆可用也寸闗脈沈而濇氣虚四君子湯為主血虚四物湯為主左手脈無力大不可用香燥之藥服之必死宜薄滋味馬剥兒燒灰存性一錢重好棗肉平胃散二錢温酒調服食即可下然後隨病源調理神効陳皮三斤三兩朴三斤二兩草三十兩蒼五斤傷食戴云惡食者胸中有物導痰補脾二陳湯加白术山查川芎蒼术痞食積兼濕東垣有法有方又痞滿方右用皂角仁浸濃汁丸如梧桐子大毎服五七丸黃連化痰丸黃連一兩陳皮五錢吳茱茰酒浸一錢半夏一兩半右為末入桃仁二十四箇研如泥和匀神麴糊丸如菉荳大毎服百丸薑湯送下消痰方益元散七錢吳茱茰三錢治鬱痰方白疆蚕杏仁𤓰蔞柯子貝母喘戴云有痰喘有氣急喘有胃虚喘有火炎上喘痰喘者凡喘便有痰聲氣急喘者呼吸急促而無痰聲有胃虚喘者檯肩縮肚喘而不休火炎上喘者乍進乍退得食則减食已則喘大槩胃中有實火膈上有稠痰得食咽墜下稠痰喘即止稍乆食已入胃及助其火痰再升上喘反大作俗不知此作胃虚治以燥熱之藥者以火濟火也昔葉都督患此諸醫作胃虚治之不愈後以導水丸利五六次而安凢乆喘未發以扶正氣為要已發以攻邪為主有氣虛短氣而喘有痰亦短氣而喘有陰虛自小腹下火起而上者喘急有風痰者婦人大全方十緍湯陰虛有痰喘急者補隂降火四物湯加枳殻半夏氣虛者人參蜜炙黃栢麥門冬地骨皮之類大槩喘急之病甚不可用苦藥凉藥火氣盛故也可用導痰湯加十緍湯治之諸喘不止者用刼藥一二貼則止之刼藥之後因痰治痰因火治火椒目碾極細末用一二錢以生薑湯調下又法用蘿蔔子蒸熟為君又皂角燒灰等分為末以生薑汁煉蜜為丸小桐子大毎服五七十丸噙化之哮専主於痰宜吐法治哮必用薄滋味不可純用凉藥必帶表散黃芩麥門冬制肝木若腹脹少佐厚朴氣不運加木香木通氣若陷下升麻柴胡提之隨證加减必須補中産後必用大補氣血為主少佐以蒼术茯苓使水日降用大劑白术補脾壅滿用半夏陳皮香附監之有熱當清肺麥門冬黃芩之屬一方用山梔子去皮取仁炒槌碎米飲送下若胃脘熱病在上者帶皮用皷脹又名單皷其詳在格致論中大補中氣行濕此乃脾虚之甚須必逺音樂斷厚味以大劑人參白术佐以陳皮茯苓蒼术之類有血虚當以四物湯行血脈實兼人壯盛者或可用攻藥便用收拾白术為主厚朴治腹脹因味辛以散其氣在中焦故也自汗屬氣虛虛濕熱陽虛東垣有法有方人參黃茋少佐桂枝陽虛附子亦可用撲法牡蠣麸皮藁本糯米防風白芷麻黃根為末週身撲之火氣上蒸胃中之濕亦能作汗凉膈散主之痰證亦有汗者盗汗血虛隂虛戴云盗汗者睡則汗自出覺則無矣非若自汗而自出也小兒不須治東垣有法有方當歸六黃湯盗汗方白术四兩一兩用黃茋同炒一兩用石斛同炒一兩用壯礪末同炒一兩用麩皮同炒各㣲黃色餘藥不用只用白术右為細末毎服三錢用粟米湯調下盡四兩為效吃逆有痰氣虛隂火視其有餘不足治之戴云吃逆者因痰與熱胃火者極多不足者人參白术湯下大補丸有餘并痰者吐之人參蘆之屬頭風有痰者多左屬風荆芥薄荷屬血虛川芎當歸芍藥右屬痰蒼术半夏屬熱黃芩搐藥有用蓽撥猪膽頭痛多主於痰痛甚者火多亦有可吐者亦有可下者清空膏治諸般頭痛除血虚頭痛不治血虛頭痛自魚尾上攻頭痛必用川芎當歸湯古方有追涎藥出東垣試効𦍑活防風黃連各炒一兩柴胡七錢川芎二錢甘草炙一兩半黃芩三兩刮取黃色剉碎一半酒炒一半右為末毎服二錢匕熱盞内入茶少許湯調如膏抹在口内少用湯送下臨卧服之頭眩痰挾氣虛火治痰為主挾補氣藥并降火藥屬痰無痰則不能作眩屬火痰因火動又有濕痰者有火多者左手脈數熱多脈濇有死血右手脈實痰積脈大必是久病眩暈火動其痰二陳湯加黃芩蒼术羌活散風行濕或用防風行濕之劑可也昔有一老婦患赤白帶一年半是頭眩坐立不久睡之則安専用治赤白帶除之其眩則自安矣眉稜痛風熱痰作風痰治類痛風白术酒黃芩末茶調又方川烏頭草烏二味為君童便浸洗炒去毒細辛黃芩𦍑活甘草佐之耳聾少陽厥隂熱多皆屬於熱耳鳴者是戴云亦有氣閉者蓋亦是熱氣閉者耳不鳴也萆麻子四十九粒棗肉十箇右入人乳搗成膏子石頭上略晒乾便丸如桐子大以綿褁塞於耳中又方用䑕膽入耳中尤好仍開痰散風熱大病復須用四物湯降火有隂虛火動耳聾者亦如上法金匱鈎𤣥卷一
